<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Flash Bounty Board - Earn Bitcoin contributing to Flash open source">
  <title>Flash Bounty Board &#x26A1;</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x26A1;</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header>
    <div class="header-inner">
      <div class="logo-area">
        <span class="flash-bolt">&#x26A1;</span>
        <div class="title-group">
          <h1>Flash Bounty Board &#x26A1;</h1>
          <p class="subtitle">Earn Bitcoin for contributing to Flash open source</p>
        </div>
      </div>
      <nav class="header-nav">
        <a href="https://getflash.io" target="_blank" rel="noopener">getflash.io</a>
        <a href="https://github.com/lnflash" target="_blank" rel="noopener">GitHub</a>
        <a href="https://github.com/lnflash/flash/blob/main/CONTRIBUTING.md" target="_blank" rel="noopener" class="btn-contribute">&#x1F4D6; How to Contribute</a>
      </nav>
    </div>
  </header>

  <div class="stats-bar" id="stats">
    <div class="stat"><span class="stat-val" id="stat-total">-</span><span class="stat-label">Total Bounties</span></div>
    <div class="stat"><span class="stat-val" id="stat-sats">-</span><span class="stat-label">Sats Pool &#x26A1;</span></div>
    <div class="stat"><span class="stat-val" id="stat-open">-</span><span class="stat-label">Open</span></div>
    <div class="stat"><span class="stat-val" id="stat-done">-</span><span class="stat-label">Completed</span></div>
  </div>

  <main id="main">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Loading bounties from GitHub...</p>
    </div>
    <div id="error" class="error hidden"></div>
    <div class="filter-bar hidden" id="filter-bar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search-input" type="search" placeholder="Search bounties…" autocomplete="off">
      </div>
      <div class="filter-pills">
        <button class="filter-pill active" data-filter="all">All</button>
        <button class="filter-pill" data-filter="spark">⚡ Spark</button>
        <button class="filter-pill" data-filter="flame">🔥 Flame</button>
        <button class="filter-pill" data-filter="eruption">🌋 Eruption</button>
        <button class="filter-pill" data-filter="summit">🏔️ Summit</button>
        <button class="filter-pill" data-filter="paid">✓ Paid</button>
      </div>
    </div>
    <div id="bounties-container"></div>
  </main>

  <footer>
    <div class="footer-inner">
      <p class="footer-tagline">Powered by Flash &#x26A1; | Built in the Caribbean &#x1F334;</p>
      <div class="footer-links">
        <a href="https://github.com/lnflash" target="_blank" rel="noopener">GitHub Org</a>
        <a href="https://discord.gg/RHMb7nJfFt" target="_blank" rel="noopener">Discord</a>
        <a href="https://github.com/lnflash/flash/blob/main/CONTRIBUTING.md" target="_blank" rel="noopener">CONTRIBUTING.md</a>
        <a href="https://getflash.io" target="_blank" rel="noopener">getflash.io</a>
      </div>
    </div>
  </footer>
</div>
<script src="script.js"></script>
</body>
</html>
